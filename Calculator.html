<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
    <div class="calculator" id="calculator">
        <input type="text" id="display" readonly>

        <!-- Toggle Button -->
        <button class="toggle-btn" onclick="toggleScientific()">SCI</button>

        <!-- Normal buttons -->
        <div class="buttons-normal">
            <button class="operator" onclick="clearDisplay()">AC</button>
            <button class="operator" onclick="deleteLast()">DE</button>
            <button class="operator" onclick="insert('%')">%</button>
            <button class="operator" onclick="insert('/')">÷</button>

            <button onclick="insert('7')">7</button>
            <button onclick="insert('8')">8</button>
            <button onclick="insert('9')">9</button>
            <button class="operator" onclick="insert('*')">×</button>

            <button onclick="insert('4')">4</button>
            <button onclick="insert('5')">5</button>
            <button onclick="insert('6')">6</button>
            <button class="operator" onclick="insert('-')">−</button>

            <button onclick="insert('1')">1</button>
            <button onclick="insert('2')">2</button>
            <button onclick="insert('3')">3</button>
            <button class="operator" onclick="insert('+')">+</button>

            <button class="zero" onclick="insert('0')">0</button>
            <button onclick="insert('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
            
        </div>

        <!-- Scientific buttons (hidden by default) -->
        <div class="buttons scientific">
            <button onclick="sin()">sin</button>
            <button onclick="cos()">cos</button>
            <button onclick="tan()">tan</button>
            <button onclick="insert('^')">^</button>
            <button onclick="insertBracket()">( )</button>
            <button onclick="sqrt()">√</button>
            <button onclick="insert('1/')">1/x</button>
            <button onclick="square()">x²</button>
            <button onclick="log()">log</button>
            <button onclick="insert('ln(')">ln</button>
            <button onclick="insert('3.1416')">π</button>
            <button onclick="insert('e')">e</button>
            
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
